<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fcfbf7; --text-main: #5d574f; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Quicksand', sans-serif; margin: 0; overflow-x: hidden; height: 100vh; width: 100vw; }
        
        @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bike-ride { 0% { transform: translateX(-120%); } 100% { transform: translateX(0%); } }
        .spin { animation: wheel-spin 1s linear infinite; transform-origin: center; }
        .scene { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }
        #bike-container { width: 300px; animation: bike-ride 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards; }
        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 1px solid #f0f0f0; }
        .card:hover { transform: translateY(-5px); }
        .letter-card { background-color: #fdfdf5; padding: 40px; width: 90%; max-width: 450px; transform: rotate(-1deg); border: 1px solid #e8e4d8; font-family: 'Indie Flower', cursive; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source id="music-source" src="A.mp3" type="audio/mpeg"></audio>

    <div id="scene-start" class="scene active">
        <h2 class="text-2xl italic mb-6">A journey made just for you...</h2>
        <button onclick="startExperience()" class="bg-blue-500 text-white px-8 py-3 rounded-full shadow-lg">Begin ❤️</button>
    </div>

    <div id="scene-travel" class="scene">
        <div id="bike-container">
            <svg viewBox="0 0 240 200"><g class="spin" style="transform-origin: 50px 145px;"><circle cx="50" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g><g class="spin" style="transform-origin: 190px 145px;"><circle cx="190" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g><path d="M50 145 L100 145 L140 80 L185 80 L190 145 M100 145 L85 75 M85 75 L70 75 M140 80 L130 50 M130 50 L150 50" fill="none" stroke="#333" stroke-width="3"/></svg>
        </div>
        <p id="travel-text" class="mt-8 text-xl italic font-light"></p>
    </div>

    <div id="scene-shop" class="scene">
        <h1 class="text-3xl font-light mb-8">Art Flower Shop</h1>
        <div class="flower-grid" id="flower-grid"></div>
    </div>

    <div id="scene-letter" class="scene">
        <div class="letter-card">
            <p id="letter-content" class="text-lg"></p>
            <p class="text-right mt-4 font-bold">- Your favorite person</p>
        </div>
        <button onclick="goToMarket()" class="mt-8 bg-pink-100 text-pink-700 px-6 py-2 rounded-full">Continue Ride 🧺</button>
    </div>

    <div id="scene-market" class="scene">
        <h1 class="text-3xl font-light mb-8">The Market</h1>
        <div class="grid grid-cols-3 gap-4">
            <div onclick="nextRide('animals', 'C.mp3')" class="card text-center"> <span class="text-4xl">🥩</span><p>Meat</p> </div>
            <div onclick="nextRide('animals', 'C.mp3')" class="card text-center"> <span class="text-4xl">🐟</span><p>Fish</p> </div>
            <div onclick="nextRide('animals', 'C.mp3')" class="card text-center"> <span class="text-4xl">🥦</span><p>Veg</p> </div>
        </div>
    </div>

    <div id="scene-animals" class="scene">
        <h1 class="text-3xl font-light mb-4">Friendly Visitors</h1>
        <p class="italic mb-8">Look who came to say hello!</p>
        <div class="grid grid-cols-3 gap-4">
            <div onclick="nextRide('home', 'D.mp3')" class="card text-center"> <span class="text-5xl">🐱</span><p>Cat</p> </div>
            <div onclick="nextRide('home', 'D.mp3')" class="card text-center"> <span class="text-5xl">🐶</span><p>Dog</p> </div>
            <div onclick="nextRide('home', 'D.mp3')" class="card text-center"> <span class="text-5xl">🐦</span><p>Bird</p> </div>
        </div>
    </div>

    <div id="scene-home" class="scene">
        <div class="text-center">
            <span class="text-6xl">🏡</span>
            <h1 class="text-4xl font-bold mt-6">Welcome Home</h1>
            <p class="mt-4 text-gray-500 italic">The best part of any journey is coming back to you.</p>
            <button onclick="location.reload()" class="mt-10 text-sm underline text-gray-400">Restart Journey</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let currentScene = 'scene-start';

        function changeMusic(file) {
            audio.src = file;
            audio.play();
        }

        function switchScene(nextId) {
            document.getElementById(currentScene).classList.remove('active');
            document.getElementById(nextId).classList.add('active');
            currentScene = nextId;
        }

        function startExperience() {
            changeMusic('A.mp3');
            rideTo("Heading to the Flower Shop...", 'scene-shop');
        }

        function rideTo(text, nextScene) {
            document.getElementById('travel-text').innerText = text;
            switchScene('scene-travel');
            
            // Reset bike animation
            const container = document.getElementById('bike-container');
            container.style.animation = 'none';
            container.offsetHeight; 
            container.style.animation = null;

            setTimeout(() => switchScene(nextScene), 3500);
        }

        function goToMarket() {
            changeMusic('B.mp3');
            rideTo("Let's grab some food at the market...", 'scene-market');
        }

        function nextRide(target, musicFile) {
            changeMusic(musicFile);
            const msg = target === 'animals' ? "Wait, look at the animals! 🐾" : "Sun is setting, time to head home... 🌅";
            rideTo(msg, 'scene-' + target);
        }

        // Initialize Flowers
        const flowerData = [
            { n: "Rose", c: "#ff4d6d", m: "You are as beautiful as a rose." },
            { n: "Lily", c: "#ffffff", m: "Your soul is pure and bright." },
            { n: "Tulip", c: "#ffb703", m: "You bring color to my life." }
        ];

        const grid = document.getElementById('flower-grid');
        flowerData.forEach(f => {
            const div = document.createElement('div');
            div.className = "card text-center";
            div.innerHTML = `<div style="width:20px;height:20px;background:${f.c};margin:0 auto;border-radius:50%"></div><p>${f.n}</p>`;
            div.onclick = () => {
                document.getElementById('letter-content').innerText = f.m;
                switchScene('scene-letter');
            };
            grid.appendChild(div);
        });
    </script>
</body>
                </html>
