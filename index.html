<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Indie+Flower&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --main-green: #52796f; --accent-pink: #f06292; --accent-orange: #fb8c00; --accent-teal: #00897b; }
        body { margin: 0; overflow: hidden; height: 100vh; font-family: 'Quicksand', sans-serif; background: #fff; transition: background 1.5s ease; }
        
        /* Animations */
        @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bike-bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes bike-ride { 0% { transform: translateX(-110vw); } 100% { transform: translateX(10vw); } }
        @keyframes cloud-drift { from { transform: translateX(110vw); } to { transform: translateX(-20vw); } }
        @keyframes petal-fall { 
            0% { transform: translate(100vw, -10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translate(-10vw, 100vh) rotate(360deg); opacity: 0; }
        }
        @keyframes road-move { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -100; } }

        .scene { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Bike & Environment */
        #bike-container { width: 300px; animation: bike-ride 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; z-index: 20; }
        .bike-frame { animation: bike-bounce 0.6s ease-in-out infinite; }
        .wheel { animation: wheel-spin 0.8s linear infinite; transform-origin: center; transform-box: fill-box; }
        .travel-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; display: none; }
        .active-travel .travel-bg { display: block; }
        .cloud { position: absolute; opacity: 0.5; animation: cloud-drift 25s linear infinite; }
        .petal { position: absolute; animation: petal-fall 6s linear infinite; }
        .road-line { stroke: #d1d5db; stroke-width: 4; stroke-dasharray: 20 20; animation: road-move 1s linear infinite; }

        /* Cards & Buttons */
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-width: 500px; width: 90%; border: 1px solid #f0f0e0; }
        .btn-fancy { padding: 12px 30px; border-radius: 50px; text-transform: uppercase; letter-spacing: 2px; font-size: 11px; font-weight: bold; transition: 0.3s; }
        .building-svg { cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .building-svg:hover { transform: scale(1.05) translateY(-10px); }
        .flower-item { background: white; padding: 15px; border-radius: 15px; transition: 0.3s; cursor: pointer; border: 1px solid #f0f0f0; }
        .flower-item:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body id="main-body">

    <div id="env-layer" class="travel-bg">
        <div class="cloud text-5xl" style="top: 10%;">☁️</div>
        <div class="cloud text-4xl" style="top: 22%; animation-delay: -7s;">☁️</div>
        <div class="petal text-xl" style="top: 5%; animation-delay: 1s;">🌸</div>
        <div class="petal text-lg" style="top: 15%; animation-delay: 3s;">🌸</div>
        <svg class="absolute bottom-[20%] w-full h-10"><line x1="0" y1="5" x2="100%" y2="5" class="road-line" /></svg>
    </div>

    <div id="scene-start" class="scene active">
        <h1 class="text-3xl font-light mb-12 italic text-gray-700">A Journey Just For Us</h1>
        <button onclick="startJourney()" class="btn-fancy bg-gray-800 text-white hover:bg-gray-700 shadow-xl">Start the Ride ❤️</button>
    </div>

    <div id="scene-travel" class="scene">
        <div id="bike-container">
            <svg viewBox="0 0 300 200">
                <g class="wheel"><circle cx="75" cy="150" r="40" fill="none" stroke="#333" stroke-width="4"/><line x1="35" y1="150" x2="115" y2="150" stroke="#999"/><line x1="75" y1="110" x2="75" y2="190" stroke="#999"/></g>
                <g class="wheel"><circle cx="225" cy="150" r="40" fill="none" stroke="#333" stroke-width="4"/><line x1="185" y1="150" x2="265" y2="150" stroke="#999"/><line x1="225" y1="110" x2="225" y2="190" stroke="#999"/></g>
                <g class="bike-frame">
                    <path d="M75 150 L125 150 L175 80 L225 150 M125 150 L115 70 M175 80 L165 50" fill="none" stroke="var(--main-green)" stroke-width="6" stroke-linecap="round"/>
                    <rect x="185" y="75" width="40" height="30" fill="#d2b48c" rx="3"/>
                    <path d="M100 70 L135 70" stroke="#8b5a2b" stroke-width="8" stroke-linecap="round"/>
                </g>
            </svg>
        </div>
        <p id="travel-text" class="mt-8 text-xl italic text-gray-500 font-light"></p>
    </div>

    <div id="scene-shop-ext" class="scene">
        <div class="building-svg" onclick="enterBuilding('scene-shop-int', '#fff5f7')">
            <svg width="350" height="280" viewBox="0 0 400 300">
                <rect x="100" y="100" width="200" height="150" fill="#fce4ec" rx="5"/>
                <path d="M80 100 L320 100 L300 50 L100 50 Z" fill="#f06292"/>
                <rect x="130" y="150" width="50" height="50" fill="white" rx="3"/><rect x="210" y="150" width="60" height="100" fill="white" rx="2"/>
                <text x="200" y="30" font-family="Dancing Script" font-size="32" fill="#880e4f" text-anchor="middle">The Flower Shop</text>
            </svg>
        </div>
    </div>

    <div id="scene-shop-int" class="scene">
        <h2 class="text-2xl mb-8 italic">Pick a flower for your heart...</h2>
        <div id="flower-grid" class="grid grid-cols-3 gap-4 max-w-2xl px-4"></div>
    </div>

    <div id="scene-market-ext" class="scene">
        <div class="building-svg" onclick="enterBuilding('scene-market-int', '#fffdf5')">
            <svg width="350" height="280" viewBox="0 0 400 300">
                <rect x="80" y="100" width="240" height="150" fill="#fff3e0" rx="5"/>
                <rect x="175" y="40" width="50" height="60" fill="#ffe0b2"/><path d="M165 40 L235 40 L200 10 Z" fill="#fb8c00"/><circle cx="200" cy="70" r="12" fill="white"/>
                <text x="200" y="280" font-family="Dancing Script" font-size="32" fill="#e65100" text-anchor="middle">The Market</text>
            </svg>
        </div>
    </div>

    <div id="scene-market-int" class="scene">
        <h2 class="text-2xl mb-8 italic text-gray-600">Something healthy for you...</h2>
        <div class="flex gap-6">
            <button onclick="showLetter('market', 'meat')" class="bg-white p-8 rounded-2xl shadow-lg text-5xl hover:scale-110 transition">🥩</button>
            <button onclick="showLetter('market', 'fish')" class="bg-white p-8 rounded-2xl shadow-lg text-5xl hover:scale-110 transition">🐟</button>
            <button onclick="showLetter('market', 'veg')" class="bg-white p-8 rounded-2xl shadow-lg text-5xl hover:scale-110 transition">🥦</button>
        </div>
    </div>

    <div id="scene-letter" class="scene">
        <div class="card">
            <h3 id="letter-title" class="text-2xl font-bold mb-4 font-['Dancing_Script']"></h3>
            <p id="letter-content" class="text-lg font-['Indie_Flower'] leading-relaxed text-gray-700"></p>
            <div class="mt-6 text-right italic font-bold text-gray-400">— Forever Yours</div>
        </div>
        <div class="flex gap-4 mt-8">
            <button id="btn-back" class="btn-fancy bg-white border border-gray-200">Go Back</button>
            <button id="btn-next" class="btn-fancy text-white shadow-lg"></button>
        </div>
    </div>

    <div id="scene-home-ext" class="scene">
        <div class="building-svg" onclick="finishJourney()">
            <svg width="350" height="280" viewBox="0 0 400 300">
                <rect x="100" y="120" width="200" height="130" fill="#e0f2f1" rx="5"/>
                <path d="M80 120 L320 120 L200 40 Z" fill="#80cbc4"/>
                <rect x="175" y="170" width="50" height="80" fill="#00695c"/>
                <text x="200" y="280" font-family="Dancing Script" font-size="32" fill="#004d40" text-anchor="middle">Welcome Home ❤️</text>
            </svg>
        </div>
    </div>

    <div id="scene-home-int" class="scene">
        <div class="card text-center">
            <div class="text-7xl mb-6">🏡 ❤️</div>
            <h2 class="text-3xl font-['Dancing_Script'] mb-4">I'm so glad you're here.</h2>
            <p class="text-lg font-['Indie_Flower']">Every journey, no matter how small, is better when I'm headed toward you.</p>
        </div>
        <button onclick="location.reload()" class="mt-10 text-gray-400 underline text-xs tracking-widest uppercase">Restart</button>
    </div>

    <script>
        const flowers = [
            { name: "Blue Hydrangea", color: "#4361ee", msg: "This blue flower represents the quality I admire most in you: your deep faith and devotion in serving and loving Jehovah God. Your spiritual strength and beautiful heart make me love you more every day." },
            { name: "Pink Roses", color: "#ff85a1", msg: "Pink roses signify grace and admiration. I admire every little thing about you—your smile, your kind eyes, and the way you handle the world with such elegance." },
            { name: "Orange Tulips", color: "#fb8500", msg: "Orange tulips represent energy and desire. You fill my days with such vibrant energy that I can't imagine a morning without your light." },
            { name: "Yellow Tulips", color: "#ffb703", msg: "Yellow is the color of sunshine. You are my ray of sunshine on even the cloudiest days. This bouquet is a small reminder of the joy you bring into my life." },
            { name: "Purple Peonies", color: "#7209b7", msg: "Peonies are a symbol of prosperity and a happy life. With you, I already feel like the happiest person in the world." },
            { name: "Blush Roses", color: "#ffc8dd", msg: "You always take care of everyone else, but I want to make sure you’re taking care of you, too. I’m always here to listen." },
            { name: "Coral Tulips", color: "#ff7b54", msg: "Coral is a unique, warm color—just like your heart. You have a way of making everything feel special." },
            { name: "Red Roses", color: "#9b2226", msg: "Deep red for a deep, profound love. My commitment to you goes beyond words. You are my soulmate and my best friend." },
            { name: "White Lilies", color: "#f8f9fa", msg: "White lilies represent purity and loyalty. Your pure heart and honest soul are what make our relationship so strong." }
        ];

        const marketMsgs = {
            meat: "Protein for your strength! Please stay healthy so we can go on many more adventures together. Eat well for me!",
            fish: "Fish is great for your bright mind. Take care of your health because you are my whole world.",
            veg: "Vitamins for my favorite person! Your health is my priority because I want to see you happy for a long time."
        };

        let currentScene = 'scene-start';

        function switchScene(id) {
            document.getElementById(currentScene).classList.remove('active');
            document.getElementById(id).classList.add('active');
            currentScene = id;
        }

        function rideTo(text, target, bg) {
            document.getElementById('main-body').classList.add('active-travel');
            document.getElementById('travel-text').innerText = text;
            switchScene('scene-travel');
            setTimeout(() => {
                document.getElementById('main-body').classList.remove('active-travel');
                switchScene(target);
                document.getElementById('main-body').style.background = bg;
            }, 3500);
        }

        function startJourney() {
            rideTo("Riding to the Flower Shop...", 'scene-shop-ext', '#fff5f7');
            const grid = document.getElementById('flower-grid');
            grid.innerHTML = flowers.map(f => `
                <div class="flower-item text-center" onclick="showLetter('flower', ${JSON.stringify(f).replace(/"/g, '&quot;')})">
                    <div style="color:${f.color}; font-size: 2.5rem;">🌸</div>
                    <div class="text-[10px] uppercase mt-2 text-gray-400 font-bold">${f.name}</div>
                </div>
            `).join('');
        }

        function showLetter(type, data) {
            const title = document.getElementById('letter-title');
            const content = document.getElementById('letter-content');
            const next = document.getElementById('btn-next');
            const back = document.getElementById('btn-back');

            if(type === 'flower') {
                title.innerText = "To my beloved,";
                content.innerText = data.msg;
                next.innerText = "To Market";
                next.style.backgroundColor = "var(--accent-pink)";
                next.onclick = () => rideTo("Heading to the market...", 'scene-market-ext', '#fffdf5');
                back.onclick = () => switchScene('scene-shop-int');
            } else {
                title.innerText = "A healthy note...";
                content.innerText = marketMsgs[data];
                next.innerText = "Go Home";
                next.style.backgroundColor = "var(--accent-teal)";
                next.onclick = () => rideTo("Riding home to you...", 'scene-home-ext', '#f0fbf9');
                back.onclick = () => switchScene('scene-market-int');
            }
            switchScene('scene-letter');
        }

        function enterBuilding(id, bg) { switchScene(id); document.getElementById('main-body').style.background = bg; }
        function finishJourney() { switchScene('scene-home-int'); document.getElementById('main-body').style.background = '#f0fbf9'; }
    </script>
</body>
                        </html>
