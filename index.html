<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fcfbf7; --text-main: #5d574f; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Quicksand', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        
        @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bike-ride { 0% { transform: translateX(-120%); } 100% { transform: translateX(0%); } }
        @keyframes animal-float { 0% { transform: translateX(120vw); } 100% { transform: translateX(-20vw); } }

        .spin { animation: wheel-spin 1s linear infinite; transform-origin: center; }
        .scene { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }
        
        #bike-container { width: 300px; animation: bike-ride 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards; z-index: 10; }
        .animal-runner { position: absolute; font-size: 3rem; bottom: 20%; animation: animal-float 4s linear infinite; display: none; }

        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 600px; }
        .item-card { background: rgba(255,255,255,0.6); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .item-card:hover { transform: translateY(-5px); background: white; }
        
        .letter-card { background-color: #fdfdf5; padding: 35px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); transform: rotate(-1deg); border: 1px solid #e8e4d8; }
        .letter-text { font-family: 'Indie Flower', cursive; font-size: 1.1rem; line-height: 1.5; color: #444; }
        .letter-title { font-family: 'Dancing Script', cursive; font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; }

        .building-trigger { cursor: pointer; transition: transform 0.5s; }
        .building-trigger:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="A.mp3" type="audio/mpeg"></audio>

    <div id="scene-start" class="scene active bg-white">
        <h2 class="text-2xl font-light mb-6 italic">A surprise for someone truly special...</h2>
        <button onclick="startExperience()" class="bg-blue-50 text-blue-700 px-8 py-3 rounded-full border border-blue-200">Click to Start ❤️</button>
    </div>

    <div id="scene-travel" class="scene">
        <div id="animal-cat" class="animal-runner">🐱</div>
        <div id="animal-dog" class="animal-runner" style="animation-delay: 1.5s;">🐶</div>
        <div id="animal-bird" class="animal-runner" style="animation-delay: 0.5s; bottom: 60%;">🐦</div>
        <div id="bike-container">
            <svg viewBox="0 0 240 200">
                <g class="spin" style="transform-origin: 50px 145px;"><circle cx="50" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g>
                <g class="spin" style="transform-origin: 190px 145px;"><circle cx="190" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g>
                <path d="M50 145 L100 145 L140 80 L185 80 L190 145 M100 145 L85 75 M85 75 L70 75 M140 80 L130 50 M130 50 L150 50" fill="none" stroke="#333" stroke-width="3"/>
            </svg>
        </div>
        <p id="travel-text" class="mt-8 text-xl font-light italic"></p>
    </div>

    <div id="scene-shop-ext" class="scene">
        <h1 class="text-3xl font-light mb-8">Art Flower Shop</h1>
        <div class="building-trigger" onclick="switchScene('scene-shop-int')">
            <svg width="200" height="160" viewBox="0 0 200 160">
                <rect x="30" y="60" width="140" height="80" fill="none" stroke="#333" stroke-width="2"/>
                <path d="M20 60 L180 60 L190 40 L10 40 Z" fill="none" stroke="#333" stroke-width="2"/>
                <text x="100" y="100" font-family="Dancing Script" font-size="14" text-anchor="middle">Enter Shop ✨</text>
            </svg>
        </div>
    </div>

    <div id="scene-shop-int" class="scene">
        <h1 class="text-2xl font-light mb-6 italic">Pick a flower...</h1>
        <div class="flower-grid" id="flower-grid"></div>
    </div>

    <div id="scene-market-ext" class="scene">
        <h1 class="text-3xl font-light mb-8">The Local Market</h1>
        <div class="building-trigger" onclick="switchScene('scene-market-int')">
            <svg width="200" height="160" viewBox="0 0 200 160">
                <rect x="20" y="50" width="160" height="90" fill="none" stroke="#333" stroke-width="2"/>
                <path d="M10 50 L190 50 L170 20 L30 20 Z" fill="none" stroke="#333" stroke-width="2"/>
                <text x="100" y="95" font-family="Dancing Script" font-size="14" text-anchor="middle">Click to Enter 🧺</text>
            </svg>
        </div>
    </div>

    <div id="scene-market-int" class="scene">
        <h1 class="text-2xl font-light mb-6 italic">Choose something healthy...</h1>
        <div class="flex gap-4">
            <div onclick="showMarketLetter('meat')" class="item-card"><span class="text-4xl">🥩</span><p>Meat</p></div>
            <div onclick="showMarketLetter('fish')" class="item-card"><span class="text-4xl">🐟</span><p>Fish</p></div>
            <div onclick="showMarketLetter('veg')" class="item-card"><span class="text-4xl">🥦</span><p>Veg</p></div>
        </div>
    </div>

    <div id="scene-letter" class="scene">
        <div class="letter-card">
            <div id="letter-title" class="letter-title"></div>
            <div id="letter-content" class="letter-text"></div>
        </div>
        <div class="flex gap-4 mt-8">
            <button id="btn-back" class="px-6 py-2 border rounded-full text-sm bg-white"></button>
            <button id="btn-next" class="px-6 py-2 rounded-full text-sm font-bold"></button>
        </div>
    </div>

    <div id="scene-animals" class="scene">
        <h1 class="text-3xl font-light mb-10">Friendly Neighbors</h1>
        <div class="flex gap-6">
            <div onclick="setAnimal('🐱', 'Meow! Thank you for adopting me and bringing me to your lovely home!')" class="item-card text-5xl">🐱</div>
            <div onclick="setAnimal('🐶', 'Woof! I\'m so happy you chose me to be part of your journey!')" class="item-card text-5xl">🐶</div>
            <div onclick="setAnimal('🐦', 'Chirp! Thank you for rescuing me. I\'ll sing for you!')" class="item-card text-5xl">🐦</div>
        </div>
    </div>

    <div id="scene-home-ext" class="scene">
        <h1 class="text-3xl font-light mb-8">Our Cozy Home</h1>
        <div class="building-trigger" onclick="enterHome()">
            <svg width="200" height="160" viewBox="0 0 200 160">
                <rect x="40" y="70" width="120" height="70" fill="none" stroke="#333" stroke-width="2"/>
                <path d="M30 70 L170 70 L100 30 Z" fill="none" stroke="#333" stroke-width="2"/>
                <rect x="90" y="105" width="20" height="35" fill="none" stroke="#333" stroke-width="2"/>
                <text x="100" y="100" font-family="Dancing Script" font-size="14" text-anchor="middle">Welcome ❤️</text>
            </svg>
        </div>
    </div>

    <div id="scene-home-int" class="scene">
        <div class="text-center">
            <div id="final-animal" class="text-7xl mb-4"></div>
            <div class="letter-card mx-auto mb-6">
                <div class="letter-title font-bold">A special note...</div>
                <div id="animal-thank-you" class="letter-text italic"></div>
            </div>
            <h1 class="text-2xl font-light">Welcome Home ❤️</h1>
            <p class="mt-2 text-gray-400 text-xs">The end of one journey, the start of another.</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let currentScene = 'scene-start';
        let adoptedAnimalIcon = '';
        let animalThankYou = '';

        const flowers = [
            { name: "Blue Hydrangea", color: "#4361ee", msg: "This blue flower represents the quality I admire most in you: your deep faith and devotion in serving and loving Jehovah God. Your spiritual strength and beautiful heart make me love you more every day." },
            { name: "Pink Roses", color: "#ff85a1", msg: "Pink roses signify grace and admiration. I admire every little thing about you—your smile, your kind eyes, and the way you handle the world with such elegance." },
            { name: "Orange Tulips", color: "#fb8500", msg: "Orange tulips represent energy and desire. You fill my days with such vibrant energy." },
            { name: "Yellow Tulips", color: "#ffb703", msg: "Yellow is the color of sunshine. You are my ray of sunshine on even the cloudiest days." },
            { name: "Purple Peonies", color: "#7209b7", msg: "With you, I already feel like the happiest person in the world." },
            { name: "Blush Roses", color: "#ffc8dd", msg: "I want to make sure you’re taking care of you, too. I’m always here to listen." },
            { name: "Coral Tulips", color: "#ff7b54", msg: "Coral is a unique, warm color—just like your heart." },
            { name: "Red Roses", color: "#9b2226", msg: "Deep red for a deep, profound love. You are my soulmate and my best friend." },
            { name: "White Lilies", color: "#f8f9fa", msg: "White lilies represent purity. Your pure heart and honest soul make our relationship strong." }
        ];

        const marketMsgs = {
            meat: "Protein is important for your strength! Please stay healthy so we can go on many more adventures together.",
            fish: "Fish is great for your bright mind. Take care of your health because you are my whole world.",
            veg: "Vitamins for my favorite person! Your health is my priority because I want to see you happy for a long time."
        };

        function changeMusic(file) { audio.src = file; audio.play(); }

        function switchScene(newId) {
            document.getElementById(currentScene).classList.remove('active');
            document.getElementById(newId).classList.add('active');
            currentScene = newId;
        }

        function rideAnimation(text, nextScene, showAnimals = false) {
            document.getElementById('travel-text').innerText = text;
            const animals = [document.getElementById('animal-cat'), document.getElementById('animal-dog'), document.getElementById('animal-bird')];
            animals.forEach(a => a.style.display = showAnimals ? 'block' : 'none');
            switchScene('scene-travel');
            const bike = document.getElementById('bike-container');
            bike.style.animation = 'none'; bike.offsetHeight; bike.style.animation = null;
            setTimeout(() => switchScene(nextScene), 3800);
        }

        function startExperience() {
            changeMusic('A.mp3');
            rideAnimation("Pedaling to the flower shop...", 'scene-shop-ext');
            renderFlowers();
        }

        function renderFlowers() {
            const grid = document.getElementById('flower-grid');
            grid.innerHTML = '';
            flowers.forEach((f) => {
                const pot = document.createElement('div');
                pot.className = 'item-card';
                pot.onclick = () => showLetter('flower', f);
                pot.innerHTML = `<div style="width:20px;height:20px;background:${f.color};margin:0 auto;border-radius:50%"></div><div class="text-[10px] mt-1">${f.name}</div>`;
                grid.appendChild(pot);
            });
        }

        function showLetter(type, data) {
            const title = document.getElementById('letter-title');
            const content = document.getElementById('letter-content');
            const btnBack = document.getElementById('btn-back');
            const btnNext = document.getElementById('btn-next');

            if(type === 'flower') {
                title.innerText = "To my beloved,";
                content.innerText = data.msg;
                btnBack.innerText = "Pick Another Flower 🌸";
                btnBack.onclick = () => switchScene('scene-shop-int');
                btnNext.innerText = "Go to Market 🧺";
                btnNext.className = "px-6 py-2 rounded-full text-sm font-bold bg-pink-100 text-pink-700";
                btnNext.onclick = () => { changeMusic('B.mp3'); rideAnimation("Off to the market!", 'scene-market-ext'); };
            } else {
                title.innerText = "Healthy Habits...";
                content.innerText = data;
                btnBack.innerText = "Pick More Food 🥦";
                btnBack.onclick = () => switchScene('scene-market-int');
                btnNext.innerText = "Meet Animals 🐾";
                btnNext.className = "px-6 py-2 rounded-full text-sm font-bold bg-blue-100 text-blue-700";
                btnNext.onclick = () => { changeMusic('C.mp3'); rideAnimation("Look at the animals! 🐾", 'scene-animals', true); };
            }
            switchScene('scene-letter');
        }

        function showMarketLetter(item) { showLetter('market', marketMsgs[item]); }

        function setAnimal(icon, msg) {
            adoptedAnimalIcon = icon;
            animalThankYou = msg;
            changeMusic('D.mp3');
            rideAnimation("Sun is setting... heading home.", 'scene-home-ext', true);
        }

        function enterHome() {
            switchScene('scene-home-int');
            document.getElementById('final-animal').innerText = adoptedAnimalIcon;
            document.getElementById('animal-thank-you').innerText = animalThankYou;
        }
    </script>
</body>
    </html>
