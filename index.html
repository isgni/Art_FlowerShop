<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #fcfbf7; --text-main: #5d574f; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Quicksand', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        
        @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bike-ride { 0% { transform: translateX(-120%); } 100% { transform: translateX(0%); } }
        @keyframes animal-float { 0% { transform: translateX(120vw); } 100% { transform: translateX(-20vw); } }

        .spin { animation: wheel-spin 1s linear infinite; transform-origin: center; }
        .scene { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex; }
        
        #bike-container { width: 300px; animation: bike-ride 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards; z-index: 10; }
        .animal-runner { position: absolute; font-size: 3rem; bottom: 20%; animation: animal-float 4s linear infinite; display: none; }

        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 600px; }
        .flower-pot { background: rgba(255,255,255,0.6); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .flower-pot:hover { transform: translateY(-5px); background: white; }
        
        .letter-card { background-color: #fdfdf5; padding: 35px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); transform: rotate(-1deg); border: 1px solid #e8e4d8; position: relative; }
        .letter-text { font-family: 'Indie Flower', cursive; font-size: 1.1rem; line-height: 1.5; color: #444; }
        .letter-title { font-family: 'Dancing Script', cursive; font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; }

        .market-card { background: white; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #f0f0f0; min-width: 110px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="A.mp3" type="audio/mpeg"></audio>

    <div id="scene-start" class="scene active bg-white">
        <h2 class="text-2xl font-light mb-6 italic">A surprise for someone truly special...</h2>
        <button onclick="startExperience()" class="bg-blue-50 text-blue-700 px-8 py-3 rounded-full border border-blue-200 hover:scale-105 transition-all">Click to Start ❤️</button>
    </div>

    <div id="scene-travel" class="scene">
        <div id="animal-cat" class="animal-runner">🐱</div>
        <div id="animal-dog" class="animal-runner" style="animation-delay: 1.5s;">🐶</div>
        <div id="animal-bird" class="animal-runner" style="animation-delay: 0.5s; bottom: 60%;">🐦</div>
        <div id="bike-container">
            <svg viewBox="0 0 240 200">
                <g class="spin" style="transform-origin: 50px 145px;"><circle cx="50" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g>
                <g class="spin" style="transform-origin: 190px 145px;"><circle cx="190" cy="145" r="40" fill="none" stroke="#333" stroke-width="3"/></g>
                <path d="M50 145 L100 145 L140 80 L185 80 L190 145 M100 145 L85 75 M85 75 L70 75 M140 80 L130 50 M130 50 L150 50" fill="none" stroke="#333" stroke-width="3"/>
            </svg>
        </div>
        <p id="travel-text" class="mt-8 text-xl font-light italic"></p>
    </div>

    <div id="scene-shop" class="scene">
        <h1 class="text-3xl font-light mb-8">Art Flower Shop</h1>
        <div class="flower-grid" id="flower-grid"></div>
    </div>

    <div id="scene-letter" class="scene">
        <div class="letter-card">
            <div id="letter-title" class="letter-title"></div>
            <div id="letter-content" class="letter-text"></div>
            <div class="mt-4 text-right italic font-bold">With love ❤️</div>
        </div>
        <div class="flex gap-4 mt-8">
            <button id="btn-back" class="px-6 py-2 border rounded-full text-sm bg-white"></button>
            <button id="btn-next" class="px-6 py-2 rounded-full text-sm font-bold shadow-sm"></button>
        </div>
    </div>

    <div id="scene-market" class="scene">
        <h1 class="text-3xl font-light mb-8">The Market Stop</h1>
        <div class="flex gap-4">
            <div onclick="showMarketLetter('meat')" class="market-card"><span class="text-4xl">🥩</span><p class="mt-2 font-bold">Meat</p></div>
            <div onclick="showMarketLetter('fish')" class="market-card"><span class="text-4xl">🐟</span><p class="mt-2 font-bold">Fish</p></div>
            <div onclick="showMarketLetter('veg')" class="market-card"><span class="text-4xl">🥦</span><p class="mt-2 font-bold">Veg</p></div>
        </div>
    </div>

    <div id="scene-animals" class="scene">
        <h1 class="text-3xl font-light mb-4">Friendly Neighbors</h1>
        <p class="italic text-gray-400 mb-10">Choose a friend to bring home with you!</p>
        <div class="flex gap-6">
            <div onclick="setAnimal('🐱', 'Meow! Thank you for adopting me and bringing me to your lovely home!')" class="market-card"><span class="text-5xl">🐱</span><p>Cat</p></div>
            <div onclick="setAnimal('🐶', 'Woof! I\'m so happy you chose me to be part of your journey. Thank you!')" class="market-card"><span class="text-5xl">🐶</span><p>Dog</p></div>
            <div onclick="setAnimal('🐦', 'Chirp! Thank you for rescuing me. I\'ll sing for you every morning!')" class="market-card"><span class="text-5xl">🐦</span><p>Bird</p></div>
        </div>
    </div>

    <div id="scene-home" class="scene">
        <div class="text-center">
            <div id="final-animal" class="text-7xl mb-4"></div>
            <div class="letter-card mx-auto mb-6">
                <div id="animal-thank-you" class="letter-text italic"></div>
            </div>
            <h1 class="text-4xl font-bold mt-6">Welcome Home</h1>
            <p class="mt-4 text-gray-500 italic">The best journey is the one that ends with you.</p>
            <button onclick="location.reload()" class="mt-10 text-xs underline text-gray-300">Restart</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let currentScene = 'scene-start';
        let adoptedAnimal = '';
        let animalMsg = '';

        const flowers = [
            { name: "Blue Hydrangea", color: "#4361ee", msg: "This blue flower represents the quality I admire most in you: your deep faith and devotion in serving and loving Jehovah God. Your spiritual strength and beautiful heart make me love you more every day." },
            { name: "Pink Roses", color: "#ff85a1", msg: "Pink roses signify grace and admiration. I admire every little thing about you—your smile, your kind eyes, and the way you handle the world with such elegance." },
            { name: "Orange Tulips", color: "#fb8500", msg: "Orange tulips represent energy and desire. You fill my days with such vibrant energy that I can't imagine a morning without your light." },
            { name: "Yellow Tulips", color: "#ffb703", msg: "Yellow is the color of sunshine. You are my ray of sunshine on even the cloudiest days. This bouquet is a small reminder of the joy you bring into my life." },
            { name: "Purple Peonies", color: "#7209b7", msg: "Peonies are a symbol of prosperity and a happy life. With you, I already feel like the happiest person in the world." },
            { name: "Blush Roses", color: "#ffc8dd", msg: "You always take care of everyone else, but I want to make sure you’re taking care of you, too. I’m always here to listen." },
            { name: "Coral Tulips", color: "#ff7b54", msg: "Coral is a unique, warm color—just like your heart. You have a way of making everything feel special." },
            { name: "Red Roses", color: "#9b2226", msg: "Deep red for a deep, profound love. My commitment to you goes beyond words. You are my soulmate and my best friend." },
            { name: "White Lilies", color: "#f8f9fa", msg: "White lilies represent purity and loyalty. Your pure heart and honest soul are what make our relationship so strong." }
        ];

        const marketMsgs = {
            meat: "Protein is important for your strength! I want you to stay healthy and energetic so we can go on many more bike rides together. Eat well for me!",
            fish: "Fish is great for your bright mind and heart. Please take care of your health because you are the most precious person in my world.",
            veg: "Vitamins and greens for my favorite person! Your health is my priority because I want to see your beautiful smile for a long, long time."
        };

        function changeMusic(file) { audio.src = file; audio.play().catch(e => {}); }

        function switchScene(newId) {
            document.getElementById(currentScene).classList.remove('active');
            document.getElementById(newId).classList.add('active');
            currentScene = newId;
        }

        function rideAnimation(text, nextScene, showAnimals = false) {
            document.getElementById('travel-text').innerText = text;
            const animals = [document.getElementById('animal-cat'), document.getElementById('animal-dog'), document.getElementById('animal-bird')];
            animals.forEach(a => a.style.display = showAnimals ? 'block' : 'none');
            switchScene('scene-travel');
            const bike = document.getElementById('bike-container');
            bike.style.animation = 'none'; bike.offsetHeight; bike.style.animation = null;
            setTimeout(() => switchScene(nextScene), 3800);
        }

        function startExperience() {
            changeMusic('A.mp3');
            rideAnimation("Pedaling towards you...", 'scene-shop');
            renderFlowers();
        }

        function renderFlowers() {
            const grid = document.getElementById('flower-grid');
            grid.innerHTML = '';
            flowers.forEach((f, i) => {
                const pot = document.createElement('div');
                pot.className = 'flower-pot';
                pot.onclick = () => showLetter('flower', f);
                pot.innerHTML = `<svg width="40" height="50" viewBox="0 0 60 80" class="mx-auto"><circle cx="30" cy="35" r="12" fill="${f.color}"/><path d="M15 70 L45 70 L40 85 L20 85 Z" fill="#f1f1f1" stroke="#ddd"/></svg><div class="text-[9px] mt-1">${f.name}</div>`;
                grid.appendChild(pot);
            });
        }

        function showLetter(type, data) {
            const title = document.getElementById('letter-title');
            const content = document.getElementById('letter-content');
            const btnBack = document.getElementById('btn-back');
            const btnNext = document.getElementById('btn-next');

            if(type === 'flower') {
                title.innerText = "To my beloved,";
                content.innerText = data.msg;
                btnBack.innerText = "Pick Another Flower 🌸";
                btnBack.onclick = () => switchScene('scene-shop');
                btnNext.innerText = "Continue Journey 🧺";
                btnNext.className = "px-6 py-2 rounded-full text-sm font-bold bg-pink-100 text-pink-700";
                btnNext.onclick = () => { changeMusic('B.mp3'); rideAnimation("Off to the market!", 'scene-market'); };
            } else {
                title.innerText = "Healthy Habits...";
                content.innerText = data;
                btnBack.innerText = "Pick More Food 🥦";
                btnBack.onclick = () => switchScene('scene-market');
                btnNext.innerText = "Meet Friends 🐾";
                btnNext.className = "px-6 py-2 rounded-full text-sm font-bold bg-blue-100 text-blue-700";
                btnNext.onclick = () => { changeMusic('C.mp3'); rideAnimation("Look at the animals! 🐾", 'scene-animals', true); };
            }
            switchScene('scene-letter');
        }

        function showMarketLetter(item) { showLetter('market', marketMsgs[item]); }

        function setAnimal(icon, msg) {
            adoptedAnimal = icon;
            animalMsg = msg;
            changeMusic('D.mp3');
            rideAnimation("Heading home with my new friend...", 'scene-home', true);
            document.getElementById('final-animal').innerText = adoptedAnimal;
            document.getElementById('animal-thank-you').innerText = animalMsg;
        }
    </script>
</body>
                </html>
