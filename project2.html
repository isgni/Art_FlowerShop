
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey Together</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Indie+Flower&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-default: #fdfdfa; --text-main: #4a453e; }
        body { background-color: var(--bg-default); color: var(--text-main); font-family: 'Quicksand', sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; transition: background-color 1.2s ease; }
        
        /* Animations */
        @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bike-ride { 0% { transform: translateX(-120%); } 100% { transform: translateX(0%); } }
        @keyframes animal-float { 0% { transform: translateX(120vw); } 100% { transform: translateX(-20vw); } }
        @keyframes building-in { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        
        /* Background scenery animations */
        @keyframes tree-move { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-20vw); } 
        }
        @keyframes wind-drift {
            0% { transform: translateX(100vw) translateY(0px); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateX(-20vw) translateY(20px); opacity: 0; }
        }

        .spin { animation: wheel-spin 0.8s linear infinite; transform-origin: center; }
        .scene { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; overflow: hidden; }
        .active { display: flex; }
        
        #bike-container { width: 320px; animation: bike-ride 3.5s cubic-bezier(0.45, 0, 0.55, 1) forwards; z-index: 50; }
        
        /* Scenery Elements */
        .tree { position: absolute; bottom: 15%; animation: tree-move 4s linear infinite; z-index: 5; }
        .wind-line { position: absolute; height: 2px; background: rgba(0,0,0,0.05); border-radius: 2px; animation: wind-drift 2s linear infinite; z-index: 2; }

        .animal-runner { position: absolute; font-size: 3rem; bottom: 18%; animation: animal-float 4s linear infinite; display: none; z-index: 60; }

        .flower-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 600px; }
        .flower-pot { background: rgba(255,255,255,0.7); border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .flower-pot:hover { transform: translateY(-5px); background: white; }
        
        .letter-card { background-color: #fdfdf5; padding: 35px; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); transform: rotate(-0.5deg); border: 1px solid #e8e4d8; z-index: 100; }
        .letter-text { font-family: 'Indie Flower', cursive; font-size: 1.1rem; line-height: 1.6; color: #444; }
        .letter-title { font-family: 'Dancing Script', cursive; font-size: 1.8rem; font-weight: bold; margin-bottom: 12px; }

        .building-container { animation: building-in 1s ease forwards; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .building-graphic { transition: transform 0.4s ease; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08)); }
        .building-container:hover .building-graphic { transform: translateY(-10px) scale(1.02); }

        .item-card { background: white; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #f0f0f0; min-width: 110px; }
        .item-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

    <audio id="bg-music" loop><source src="A.mp3" type="audio/mpeg"></audio>

    <div id="scene-start" class="scene active bg-white">
        <h2 class="text-2xl font-light mb-8 italic text-center">A surprise journey for you Lovelyn</h2>
        <button onclick="startExperience()" class="bg-stone-800 text-white px-10 py-3 rounded-full hover:bg-stone-700 shadow-md transition-all">Start the Ride ❤️</button>
    </div>

    <div id="scene-travel" class="scene">
        <div class="wind-line w-16" style="top: 20%; animation-delay: 0.2s;"></div>
        <div class="wind-line w-24" style="top: 40%; animation-delay: 0.8s;"></div>
        <div class="wind-line w-20" style="top: 60%; animation-delay: 0.5s;"></div>
        
        <div class="tree text-6xl" style="animation-delay: 0s;">🌳</div>
        <div class="tree text-5xl" style="animation-delay: 2s;">🌲</div>
        
        <div id="animal-cat" class="animal-runner">🐱</div>
                <circle cx="150" cy="147" r="3" fill="#d4a017"/>
                <rect x="75" y="90" width="30" height="35" rx="1" fill="#fdfdfa" opacity="0.8"/>
                <path d="M90 90 V125 M75 107 H105" stroke="#ccc" stroke-width="0.5"/>
                <rect x="175" y="90" width="30" height="35" rx="1" fill="#fdfdfa" opacity="0.8"/>
                <path d="M190 90 V125 M175 107 H205" stroke="#ccc" stroke-width="0.5"/>
                <rect x="75" y="140" width="30" height="35" rx="1" fill="#fdfdfa" opacity="0.8"/>
                <rect x="175" y="140" width="30" height="35" rx="1" fill="#fdfdfa" opacity="0.8"/>
                <circle cx="140" cy="55" r="8" fill="#fdfdfa"/>
                <rect x="50" y="170" width="180" height="10" fill="#a07c13"/>
                <text x="140" y="200" font-family="Dancing Script" font-size="24" font-weight="bold" fill="#4a453e" text-anchor="middle">Welcome Home ❤️</text>
            </svg>
        </div>
    </div>

    <div id="scene-home-int" class="scene">
        <div id="final-animal" class="text-7xl mb-6"></div>
        <div class="letter-card mx-auto mb-8">
            <div id="animal-title" class="letter-title"></div>
            <div id="animal-thank-you" class="letter-text italic"></div>
        </div>
        <h1 class="text-2xl font-light">We've arrived. ❤️</h1>
        <button onclick="location.reload()" class="mt-8 bg-stone-800 text-white px-8 py-2 rounded-full text-sm">Ride Again 🚲</button>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        let currentScene = 'scene-start';
        let adopted = {};

        const flowers = [
            { name: "Blue Hydrangea", color: "#4361ee", msg: "This blue flower represents the quality I admire most in you: your deep faith and devotion in serving and loving Jehovah God. Your spiritual strength and beautiful heart make me love you more every day." },
            { name: "Pink Roses", color: "#ff85a1", msg: "Pink roses signify grace and admiration. I admire every little thing about you—your smile, your kind eyes, and the way you handle the world with such elegance." },
            { name: "Orange Tulips", color: "#fb8500", msg: "Orange tulips represent energy and desire. You fill my days with such vibrant energy that I can't imagine a morning without your light." },
            { name: "Yellow Tulips", color: "#ffb703", msg: "Yellow is the color of sunshine. You are my ray of sunshine on even the cloudiest days. This bouquet is a small reminder of the joy you bring into my life." },
            { name: "Purple Peonies", color: "#7209b7", msg: "Peonies are a symbol of prosperity and a happy life. With you, I already feel like the happiest person in the world." },
            { name: "Blush Roses", color: "#ffc8dd", msg: "You always take care of everyone else, but I want to make sure you’re taking care of you, too. I’m always here to listen." },
            { name: "Coral Tulips", color: "#ff7b54", msg: "Coral is a unique, warm color—just like your heart. You have a way of making everything feel special." },
            { name: "Red Roses", color: "#9b2226", msg: "Deep red for a deep, profound love. My commitment to you goes beyond words. You are my soulmate and my best friend." },
            { name: "White Lilies", color: "#f8f9fa", msg: "White lilies represent purity and loyalty. Your pure heart and honest soul are what make our relationship so strong." }
        ];

        const animalData = {
            cat: { icon: '🐱', title: 'A Purr-fect Friend', msg: "Meow! Thank you for noticing me and bringing me to your lovely home. I'll keep your lap warm and remind you how special you are every single day! Purrr..." },
            dog: { icon: '🐶', title: 'Your New Guardian', msg: "Woof woof! I was so hoping you'd pick me! Thank you for adopting me. I'll protect this home and wag my tail every time I see your beautiful smile!" },
            bird: { icon: '🐦', title: 'A Song for You', msg: "Chirp chirp! Thank you for rescuing me. I'll sing the most beautiful songs every morning to make sure you wake up feeling loved!" }
        };

        const marketMsgs = {
            meat: "Protein for your strength! Please stay healthy so we can go on many more adventures together. Eat well for me!",
            fish: "Fish is great for your bright mind. Take care of your health because you are my whole world.",
            veg: "Vitamins for my favorite person! Your health is my priority because I want to see you happy for a long time."
        };

        function changeMusic(file) { audio.src = file; audio.play().catch(e => {}); }
        function switchScene(newId) { document.getElementById(currentScene).classList.remove('active'); document.getElementById(newId).classList.add('active'); currentScene = newId; }

        function rideAnimation(text, nextScene, bg, showAnimals = false) {
            document.getElementById('travel-text').innerText = text;
            document.body.style.backgroundColor = '#f7f7f0'; // Slight road color
            const animals = [document.getElementById('animal-cat'), document.getElementById('animal-dog'), document.getElementById('animal-bird')];
            animals.forEach(a => a.style.display = showAnimals ? 'block' : 'none');
            switchScene('scene-travel');
            setTimeout(() => { switchScene(nextScene); document.body.style.backgroundColor = bg; }, 3800);
        }

        function enterBuilding(scene, bg) { switchScene(scene); document.body.style.backgroundColor = bg; }

        function startExperience() {
            changeMusic('A.mp3');
            rideAnimation("Pedaling to the flower shop...", 'scene-shop-ext', '#f7faf7');
            renderFlowers();
        }

        function renderFlowers() {
            const grid = document.getElementById('flower-grid'); grid.innerHTML = '';
            flowers.forEach((f) => {
                const pot = document.createElement('div'); pot.className = 'flower-pot';
                pot.onclick = () => showLetter('flower', f);
                pot.innerHTML = `<svg width="50" height="70" viewBox="0 0 60 80" class="mx-auto"><path d="M30 40 L30 70 M20 45 L30 70 M40 45 L30 70" stroke="#7fb069" stroke-width="2" fill="none"/><circle cx="30" cy="35" r="12" fill="${f.color}" stroke="${f.color === '#f8f9fa' ? '#ddd' : 'none'}"/><path d="M15 70 L45 70 L40 85 L20 85 Z" fill="#f1f1f1" stroke="#ddd" stroke-width="1"/></svg><div class="text-[10px] text-gray-400 mt-2">${f.name}</div>`;
                grid.appendChild(pot);
            });
        }

        function showLetter(type, data) {
            const t = document.getElementById('letter-title'); const c = document.getElementById('letter-content');
            const b = document.getElementById('btn-back'); const n = document.getElementById('btn-next');
            if(type === 'flower') {
                t.innerText = "To my beloved,"; c.innerText = data.msg;
                b.innerText = "Pick Another 🌸"; b.onclick = () => enterBuilding('scene-shop-int', '#f4f7f4');
                n.innerText = "Market 🧺"; n.className = "px-6 py-2 rounded-full text-sm font-bold bg-pink-100 text-pink-700";
                n.onclick = () => { changeMusic('B.mp3'); rideAnimation("Off to the market!", 'scene-market-ext', '#fcf9f7'); };
            } else {
                t.innerText = "A healthy note..."; c.innerText = data;
                b.innerText = "Pick More Food 🥦"; b.onclick = () => enterBuilding('scene-market-int', '#f9f5f2');
                n.innerText = "Animals 🐾"; n.className = "px-6 py-2 rounded-full text-sm font-bold bg-blue-100 text-blue-700";
                n.onclick = () => { changeMusic('C.mp3'); rideAnimation("Look at the animals!", 'scene-animals', null, true); };
            }
            switchScene('scene-letter');
        }

        function showMarketLetter(item) { typeof showLetter === 'function' && showLetter('market', marketMsgs[item]); }

        function setAnimal(type) {
            adopted = animalData[type];
            changeMusic('D.mp3');
            rideAnimation("Heading home with my friend.", 'scene-home-ext', '#fdfbf5', true);
        }

        function enterHome() {
            enterBuilding('scene-home-int', '#fffef9');
            document.getElementById('final-animal').innerText = adopted.icon;
            document.getElementById('animal-title').innerText = adopted.title;
            document.getElementById('animal-thank-you').innerText = adopted.msg;
        }
    </script>
</body>
  </html>
